<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
        
      font-family: "DynatraceFlow", Roboto, Helvetica, sans-serif;
      background-color: #f8f9fa;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
</style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px; border-radius: 12px;">
        <h4 class="text-center mb-3" style="color: #0b6d42;">Forgot Password</h4>
        <form method="POST">
            {% csrf_token %}
    <!-- <button type="button" class="btn-close" aria-label="Close"></button> -->

            <div class="alert alert-primary" role="alert">
            Please enter the valid Email Address.
            </div>

            <div class="mb-3">
                <label>Email address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <button type="submit" style="background: #0b6d42;color: #fff;" class="btn w-100">Send OTP</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
