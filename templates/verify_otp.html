<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px; border-radius: 12px;">
        <h4 class="text-center text-primary mb-3">Verify OTP</h4>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Enter OTP</label>
                <input type="text" name="otp" class="form-control" placeholder="6-digit OTP" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Verify OTP</button>
        </form>
    </div>
</div>
</body>
</html>
