<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Scheduled Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-primary mb-4 text-center">✏️ Edit Scheduled Report</h3>

    <form method="POST">
      {% csrf_token %}

      <div class="row g-3">

        <!-- MANAGEMENT ZONE -->
        <div class="col-md-6">
          <label class="form-label">Management Zone</label>
          <select name="management_zone" class="form-select">

            <!-- ALL option -->
            <option value="All" {% if schedule.management_zone == "All" %}selected{% endif %}>
                All
            </option>

            {% for zone in zones %}
              <option value="{{ zone }}" {% if schedule.management_zone == zone %}selected{% endif %}>
                {{ zone }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- TIMEFRAME -->
        <div class="col-md-6">
          <label class="form-label">Time Frame</label>
          <select name="timeframe" class="form-select" required>
            <option value="1h" {% if schedule.timeframe == "1h" %}selected{% endif %}>Last 1 Hour</option>
            <option value="24h" {% if schedule.timeframe == "24h" %}selected{% endif %}>Last 24 Hours</option>
            <option value="today" {% if schedule.timeframe == "today" %}selected{% endif %}>Today</option>
            <option value="yesterday" {% if schedule.timeframe == "yesterday" %}selected{% endif %}>Yesterday</option>
            <option value="7d" {% if schedule.timeframe == "7d" %}selected{% endif %}>Last 7 Days</option>
          </select>
        </div>

        <!-- REPORT FORMAT -->
        <div class="col-md-6">
          <label class="form-label">Report Format</label>
          <select name="report_format" class="form-select" required>
            <option value="excel" {% if schedule.report_format == "excel" %}selected{% endif %}>EXCEL</option>
            <option value="csv" {% if schedule.report_format == "csv" %}selected{% endif %}>CSV</option>
            <option value="pdf" {% if schedule.report_format == "pdf" %}selected{% endif %}>PDF</option>
            <option value="json" {% if schedule.report_format == "json" %}selected{% endif %}>JSON</option>
          </select>
        </div>

        <!-- MULTIPLE EMAIL INPUT -->
        <div class="col-md-6">
          <label class="form-label">Recipient Emails</label>
          <input type="text"
                 name="recipient_email"
                 class="form-control"
                 value="{{ schedule.recipient_email }}"
                 placeholder="email1@example.com, email2@example.com"
                 required>
          <small class="text-muted">Enter multiple emails separated by commas</small>
        </div>

        <!-- RECURRENCE -->
        <div class="col-md-6">
          <label class="form-label">Recurrence</label>
          <select name="recurrence" class="form-select" required>
            <option value="daily" {% if schedule.recurrence == "daily" %}selected{% endif %}>Daily</option>
            <option value="weekly" {% if schedule.recurrence == "weekly" %}selected{% endif %}>Weekly</option>
            <option value="monthly" {% if schedule.recurrence == "monthly" %}selected{% endif %}>Monthly</option>
          </select>
        </div>

        <!-- NEXT RUN -->
        <div class="col-md-6">
          <label class="form-label">Next Run</label>
          <input type="datetime-local"
                 name="next_run"
                 class="form-control"
                 value="{{ schedule.next_run|date:'Y-m-d\\TH:i' }}"
                 required>
        </div>

      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-success px-4">Save Changes</button>
        <a href="{% url 'email_scheduler' %}" class="btn btn-secondary px-4">Cancel</a>
      </div>

    </form>
  </div>
</div>

</body>
</html>
